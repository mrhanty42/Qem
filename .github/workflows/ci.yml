name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --quiet --all-features
        run: cargo test --quiet --all-features

  linux-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROPTEST_CASES: "128"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: randomized_piece_table_recovery_and_history_roundtrip
        run: cargo test --quiet randomized_piece_table_recovery_and_history_roundtrip
      - name: randomized_piece_table_save_to_clears_sessions_and_reopens_clean
        run: cargo test --quiet randomized_piece_table_save_to_clears_sessions_and_reopens_clean
      - name: randomized_small_file_roundtrip_matches_model
        run: cargo test --quiet randomized_small_file_roundtrip_matches_model

  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cargo test (default features)
            command: cargo test
          - name: cargo test --no-default-features
            command: cargo test --no-default-features
          - name: cargo check --no-default-features --features editor,tmp-auto
            command: cargo check --no-default-features --features editor,tmp-auto
          - name: cargo check --no-default-features --features editor,tmp-source-dir
            command: cargo check --no-default-features --features editor,tmp-source-dir
          - name: cargo check --no-default-features --features editor,tmp-system-dir
            command: cargo check --no-default-features --features editor,tmp-system-dir
          - name: cargo check --no-default-features --features editor,tmp-exe-dir
            command: cargo check --no-default-features --features editor,tmp-exe-dir
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  lint-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo doc
        run: cargo doc --all-features --no-deps

  examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cargo build --examples --all-features
            command: cargo build --examples --all-features
          - name: cargo check -p qem-egui-demo
            command: cargo check -p qem-egui-demo
          - name: cargo check -p qem-egui-demo --bin large_file
            command: cargo check -p qem-egui-demo --bin large_file
          - name: cargo build --example viewport --no-default-features
            command: cargo build --example viewport --no-default-features
          - name: cargo build --example typed_editing --no-default-features
            command: cargo build --example typed_editing --no-default-features
          - name: cargo build --example perf_probe --no-default-features
            command: cargo build --example perf_probe --no-default-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  example-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run example smoke
        shell: pwsh
        run: .\scripts\smoke_examples.ps1

  benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo bench --bench document_perf --no-run
        run: cargo bench --bench document_perf --no-run

  perf-tools:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --example perf_probe
        run: cargo build --example perf_probe
      - name: collect perf matrix smoke
        shell: pwsh
        run: >
          .\scripts\collect_perf_matrix.ps1 README.md
          -Needle e
          -FindAllLimit 4
          -States clean,edited
          -Repeats 1
          -WaitSecs 0
          -SkipBuild
          -MatrixLabel ci
          -OutputJsonl target\perf-matrix-ci.jsonl
      - name: summarize perf matrix smoke
        shell: pwsh
        run: >
          .\scripts\summarize_perf_matrix.ps1
          -InputJsonl target\perf-matrix-ci.jsonl
          -OutputMarkdown target\perf-matrix-ci-summary.md
      - name: verify perf matrix artifacts
        shell: pwsh
        run: |
          if (!(Test-Path target\perf-matrix-ci.jsonl)) { throw "missing target\\perf-matrix-ci.jsonl" }
          if (!(Test-Path target\perf-matrix-ci-summary.md)) { throw "missing target\\perf-matrix-ci-summary.md" }

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --all-features
        run: cargo check --all-features
